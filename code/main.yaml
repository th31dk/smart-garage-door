esphome:
  name: esphome-web-b8b86c
  friendly_name: Garage Door Opener
  min_version: 2026.4.0
  name_add_mac_suffix: false

esp32:
  variant: esp32
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

switch:
  - platform: gpio
    name: "Garage Door Trigger"
    pin: GPIO16
    id: garage_trigger
    restore_mode: ALWAYS_OFF
    on_turn_on: 
      - delay: 500ms
      - switch.turn_off: garage_trigger

binary_sensor:
  - platform: gpio
    name: "Garage Door Reed Switch"
    pin:
      number: GPIO25
      mode:
        input: true
        pullup: true
      inverted: true